<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jargon</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&family=Source+Code+Pro&display=swap" rel="stylesheet" />
  <!-- CodeMirror 5 (optional progressive enhancement for the code editor) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
  <link rel="stylesheet" href="assets/theme.css" />
</head>
<body>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <!-- Auth gate -->
  <div id="auth-view" class="container" style="display:none;">
    <header class="app-header">
      <h1>Jargon</h1>
    </header>
    <div class="auth-card">
      <h2 id="auth-title">Sign in</h2>
      <form id="auth-form">
        <input id="auth-email" type="email" placeholder="Email" autocomplete="email" />
        <input id="auth-password" type="password" placeholder="Password" autocomplete="current-password" />
        <div id="signup-fields" style="display:none;">
          <input id="auth-name" type="text" placeholder="Name" autocomplete="name" />
          <input id="auth-grade" type="text" placeholder="Grade / level" />
        </div>
        <button id="auth-submit" type="submit">Sign in</button>
      </form>
      <a id="auth-toggle" href="#">New here? Create an account</a>
      <p id="auth-message" class="auth-message"></p>
    </div>
  </div>

  <!-- Main app -->
  <div id="app-view" class="container" style="display:none;">
    <header class="app-header">
      <div class="header-row">
        <h1>Jargon</h1>
        <div class="header-user">
          <span id="user-label"></span>
          <button id="logout-btn" type="button">Sign out</button>
        </div>
      </div>
      <div class="lesson-bar">
        <label for="lessonSelector">Lesson:</label>
        <select id="lessonSelector"></select>
        <span id="lesson-meta"></span>
      </div>
    </header>

    <div class="split">
      <!-- Mentor: AI tutor chat -->
      <section id="mentor-pane" class="pane">
        <h2>Mentor</h2>
        <div id="chat-container"></div>
        <form id="chat-form">
          <textarea id="user-input" placeholder="Message the Mentor" rows="1"></textarea>
          <button type="submit">Send</button>
        </form>
      </section>

      <!-- Interpreter: Jargon code editor -->
      <section id="editor-pane" class="pane">
        <h2>Interpreter</h2>
        <div class="editor-host">
          <textarea id="inputCode" placeholder="Write Jargon code here..."></textarea>
        </div>

        <div class="button-row">
          <button id="runBtn" type="button" title="Run (Ctrl/Cmd+Enter)">Run Code</button>
          <button id="resetBtn" class="secondary" type="button">Reset</button>
          <button id="copyInput" class="secondary" type="button">Copy Input</button>
          <button id="copyOutput" class="secondary" type="button">Copy Output</button>
        </div>

        <div class="run-bar">
          <span id="run-status" class="status-badge"></span>
        </div>

        <div id="output" aria-live="polite"></div>
        <div id="errors" aria-live="polite"></div>
        <div id="check-result" class="check" aria-live="polite"></div>

        <div id="askField">
          <input id="askInput" type="text" placeholder="" />
          <button id="submitAnswer" type="button">Submit</button>
        </div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- CodeMirror 5 core + simple-mode addon (used if reachable; editor.js falls back to a plain textarea otherwise) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/mode/simple.min.js"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="mentor/mentor.js"></script>
  <script src="editor/editor.js"></script>
  <script src="app.js"></script>

  <!-- Ambient visuals (progressive enhancement; the app works without them) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="assets/scene.js"></script>
  <script src="assets/motion.js"></script>
</body>
</html>
