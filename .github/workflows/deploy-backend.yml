name: Deploy backend (Supabase)

# Deploys the curriculum-redesign backend to Supabase:
#   - the additive 20260629000000_curriculum_authoring migration (idempotent), applied
#     via the Supabase Management API database/query endpoint
#   - the `curriculum-admin` and `chat` edge functions, via the Supabase CLI
#
# Triggers on a push to the feature branch (so the backend lands before the frontend
# `main` fast-forward) and on manual dispatch.
#
# Required repository secret (the only one):
#   SUPABASE_ACCESS_TOKEN   Supabase account access token
#                           (Dashboard > Account > Access Tokens > Generate new token).
#                           Used both for the Management API migration and the CLI deploy.

on:
  workflow_dispatch: {}
  push:
    branches:
      - claude/happy-johnson-wseex8
    paths:
      - "supabase/functions/curriculum-admin/**"
      - "supabase/functions/chat/**"
      - "supabase/functions/assessment-admin/**"
      - "supabase/functions/voice-session/**"
      - "supabase/functions/run/**"
      - "supabase/functions/canvas/**"
      - "supabase/functions/google-classroom/**"
      - "supabase/functions/resource-processing/**"
      - "supabase/migrations/**"
      - ".github/workflows/deploy-backend.yml"

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_REF: qztpieiizmiayzjhezwh
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require access token
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN repository secret is required."
            exit 1
          fi

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pinned (not "latest") so setup-cli skips the GitHub "resolve latest release" API
          # call, which is prone to rate-limit failures on shared runners.
          version: 2.109.0

      - name: Apply additive migrations (Management API; idempotent)
        run: |
          for f in \
            supabase/migrations/20260629000000_curriculum_authoring.sql \
            supabase/migrations/20260630000000_tutor_pedagogy.sql \
            supabase/migrations/20260701000000_checkpoint_required.sql \
            supabase/migrations/20260701120000_checkpoints_unified.sql \
            supabase/migrations/20260701130000_checkpoints_dualwrite.sql \
            supabase/migrations/20260702000000_tutor_v2_step_state.sql \
            supabase/migrations/20260628000000_canvas_integration.sql \
            supabase/migrations/20260705000000_mode_foundation.sql \
            supabase/migrations/20260710000000_lesson_templates.sql \
            supabase/migrations/20260715000000_class_scoping.sql \
            supabase/migrations/20260720000000_notifications.sql ; do
            echo "Applying $f"
            body="$(jq -Rs '{query: .}' "$f")"
            resp="$(mktemp)"
            code="$(curl -sS -o "$resp" -w '%{http_code}' \
              -X POST "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
              -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              --data-raw "$body")"
            echo "HTTP $code"
            cat "$resp"; echo
            if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
              echo "::error::Migration query failed for $f (HTTP $code)."
              exit 1
            fi
            echo "Applied $f."
          done

      - name: Deploy edge functions
        run: |
          supabase functions deploy curriculum-admin --project-ref "$PROJECT_REF"
          supabase functions deploy chat --project-ref "$PROJECT_REF"
          supabase functions deploy assessment-admin --project-ref "$PROJECT_REF"
          supabase functions deploy voice-session --project-ref "$PROJECT_REF"
          supabase functions deploy run --project-ref "$PROJECT_REF"
          supabase functions deploy canvas --project-ref "$PROJECT_REF"
          supabase functions deploy google-classroom --project-ref "$PROJECT_REF"
          supabase functions deploy resource-processing --project-ref "$PROJECT_REF"
