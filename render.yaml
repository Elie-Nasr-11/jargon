# Render Blueprint — tutor front-end + the Jargon engine service.
# The student app is the framework frontend in frontend/. The engine is a
# small Flask service in engine/.
services:
  - type: web
    name: jargon
    runtime: static
    buildCommand: "cd frontend && npm ci && npm run build"
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: jargon-engine
    runtime: python
    plan: free
    rootDir: engine
    buildCommand: "pip install -r requirements.txt"
    # Must bind 0.0.0.0:$PORT or Render's health check never passes.
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    healthCheckPath: /health
    pullRequestPreviewsEnabled: false
