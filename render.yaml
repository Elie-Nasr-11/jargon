# Render Blueprint — static front-end + the Jargon engine service.
# The Supabase URL + anon key live in config.js (committed), so the static site
# needs no env vars. The engine is a small Flask service in engine/.
services:
  - type: web
    name: jargon
    runtime: static
    buildCommand: "echo 'no build step'"
    staticPublishPath: .
    pullRequestPreviewsEnabled: false

  - type: web
    name: jargon-engine
    runtime: python
    plan: free
    rootDir: engine
    buildCommand: "pip install -r requirements.txt"
    # Must bind 0.0.0.0:$PORT or Render's health check never passes.
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    healthCheckPath: /health
    pullRequestPreviewsEnabled: false
