# Render Blueprint — static front-end + the Jargon engine service.
# The Supabase URL + anon key live in config.js (committed), so the static site
# needs no env vars. The engine is a small Flask service in engine/.
services:
  - type: web
    name: jargon
    runtime: static
    buildCommand: "echo 'no build step'"
    staticPublishPath: .
    pullRequestPreviewsEnabled: false

  - type: web
    name: jargon-engine
    runtime: python
    rootDir: engine
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    pullRequestPreviewsEnabled: false
